<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisper Network — Live Topology</title>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'SF Mono', 'Fira Code', monospace;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  #sidebar {
    width: 320px;
    min-width: 280px;
    background: #161b22;
    border-right: 1px solid #30363d;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 16px;
    gap: 16px;
  }

  h1 {
    font-size: 14px;
    color: #58a6ff;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding-bottom: 8px;
    border-bottom: 1px solid #30363d;
  }

  .section-title {
    font-size: 11px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .node-card {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.6;
    transition: border-color 0.2s;
  }
  .node-card.alive   { border-left: 3px solid #3fb950; }
  .node-card.suspected { border-left: 3px solid #d29922; }
  .node-card.dead    { border-left: 3px solid #f85149; }
  .node-card.offline { border-left: 3px solid #484f58; }

  .node-title {
    font-weight: bold;
    color: #e6edf3;
    font-size: 13px;
  }
  .node-meta { color: #8b949e; font-size: 11px; }
  .badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: bold;
    margin-left: 4px;
  }
  .badge.alive     { background: #1a4a1f; color: #3fb950; }
  .badge.suspected { background: #4a3b00; color: #d29922; }
  .badge.dead      { background: #4a1a1a; color: #f85149; }
  .badge.offline   { background: #2a2d33; color: #8b949e; }

  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .metric-box {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 8px;
    text-align: center;
  }
  .metric-val { font-size: 22px; font-weight: bold; color: #58a6ff; }
  .metric-lbl { font-size: 10px; color: #8b949e; text-transform: uppercase; }

  #graph-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  svg { width: 100%; height: 100%; }

  .link { stroke: #30363d; stroke-width: 1.5; }
  .link.active { stroke: #58a6ff; stroke-opacity: 0.6; stroke-width: 2; }

  .node-circle {
    stroke-width: 2;
    cursor: pointer;
    transition: r 0.2s;
  }
  .node-circle.alive     { fill: #1a4a1f; stroke: #3fb950; }
  .node-circle.suspected { fill: #4a3b00; stroke: #d29922; }
  .node-circle.dead      { fill: #4a1a1a; stroke: #f85149; }
  .node-circle.offline   { fill: #1c2128; stroke: #484f58; }

  .node-label {
    fill: #c9d1d9;
    font-size: 11px;
    font-family: 'SF Mono', monospace;
    pointer-events: none;
    text-anchor: middle;
  }
  .node-shard {
    fill: #8b949e;
    font-size: 10px;
    pointer-events: none;
    text-anchor: middle;
  }

  .task-dot {
    fill: #d2a679;
    opacity: 0.85;
  }
  .task-dot.completed { fill: #3fb950; }
  .task-dot.in_progress { fill: #d29922; }

  #status-bar {
    position: absolute;
    bottom: 12px;
    left: 12px;
    font-size: 11px;
    color: #8b949e;
  }

  .pulse {
    animation: pulse 1s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { opacity: 0.6; }
    to   { opacity: 1.0; }
  }

  .tasks-list {
    max-height: 200px;
    overflow-y: auto;
  }
  .task-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    border-bottom: 1px solid #21262d;
    font-size: 11px;
  }
  .task-status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .task-status-dot.completed  { background: #3fb950; }
  .task-status-dot.in_progress { background: #d29922; }
  .task-status-dot.pending    { background: #484f58; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Whisper Network</h1>

  <div>
    <div class="section-title">Cluster Metrics</div>
    <div class="metrics-grid" id="metrics-grid">
      <div class="metric-box"><div class="metric-val" id="m-total">—</div><div class="metric-lbl">Tasks</div></div>
      <div class="metric-box"><div class="metric-val" id="m-done">—</div><div class="metric-lbl">Done</div></div>
      <div class="metric-box"><div class="metric-val" id="m-alive">—</div><div class="metric-lbl">Alive</div></div>
      <div class="metric-box"><div class="metric-val" id="m-rescued">—</div><div class="metric-lbl">Rescued</div></div>
    </div>
  </div>

  <div>
    <div class="section-title">Nodes</div>
    <div id="node-cards" style="display:flex;flex-direction:column;gap:6px;"></div>
  </div>

  <div>
    <div class="section-title">Tasks</div>
    <div class="tasks-list" id="tasks-list"></div>
  </div>
</div>

<div id="graph-area">
  <svg id="graph"></svg>
  <div id="status-bar">connecting...</div>
</div>

<script>
const socket = io();

let simulation, svg, linkSel, nodeSel, labelSel, shardSel;
let graphData = { nodes: [], edges: [], tasks: [] };
const nodeMap = {};  // id -> d3 node object

function initSVG() {
  svg = d3.select("#graph");
  const g = svg.append("g").attr("id", "root");

  svg.call(d3.zoom().scaleExtent([0.3, 3]).on("zoom", e => {
    g.attr("transform", e.transform);
  }));

  g.append("g").attr("id", "links");
  g.append("g").attr("id", "nodes");
  g.append("g").attr("id", "labels");
  g.append("g").attr("id", "task-dots");

  simulation = d3.forceSimulation()
    .force("link",   d3.forceLink().id(d => d.id).distance(160))
    .force("charge", d3.forceManyBody().strength(-400))
    .force("center", d3.forceCenter(
      document.getElementById("graph-area").clientWidth / 2,
      document.getElementById("graph-area").clientHeight / 2
    ))
    .force("collision", d3.forceCollide(50))
    .on("tick", ticked);
}

function statusClass(s) {
  return ["alive","suspected","dead"].includes(s) ? s : "offline";
}

function updateGraph(data) {
  graphData = data;

  const W = document.getElementById("graph-area").clientWidth;
  const H = document.getElementById("graph-area").clientHeight;

  // Merge nodes preserving positions
  const existingIds = new Set(Object.keys(nodeMap));
  const newIds = new Set(data.nodes.map(n => n.id));

  // Remove departed
  existingIds.forEach(id => { if (!newIds.has(id)) delete nodeMap[id]; });

  // Add / update
  data.nodes.forEach(n => {
    if (nodeMap[n.id]) {
      Object.assign(nodeMap[n.id], n);  // update attrs, keep x/y
    } else {
      nodeMap[n.id] = { ...n, x: W/2 + (Math.random()-0.5)*200, y: H/2 + (Math.random()-0.5)*200 };
    }
  });

  const nodes = Object.values(nodeMap);
  const idSet = new Set(nodes.map(n => n.id));
  const links = data.edges
    .filter(([a,b]) => idSet.has(a) && idSet.has(b))
    .map(([a,b]) => ({ source: a, target: b }));

  // Links
  const linkG = d3.select("#links");
  const linkSel = linkG.selectAll("line").data(links, d => d.source+"|"+d.target);
  linkSel.enter().append("line").attr("class","link active")
    .merge(linkSel);
  linkSel.exit().remove();

  // Nodes
  const nodeG = d3.select("#nodes");
  const circleSel = nodeG.selectAll("circle").data(nodes, d => d.id);
  circleSel.enter().append("circle")
    .attr("r", 28)
    .call(d3.drag()
      .on("start", (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on("drag",  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on("end",   (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .merge(circleSel)
    .attr("class", d => `node-circle ${statusClass(d.status)}`);
  circleSel.exit().remove();

  // Labels — key
  const lblG = d3.select("#labels");
  const lblSel = lblG.selectAll("text.node-label").data(nodes, d => d.id);
  lblSel.enter().append("text").attr("class","node-label").attr("dy","-4px")
    .merge(lblSel).text(d => d.short || d.id.slice(0,8));
  lblSel.exit().remove();

  // Labels — shard
  const shardSel = lblG.selectAll("text.node-shard").data(nodes, d => d.id+"s");
  shardSel.enter().append("text").attr("class","node-shard").attr("dy","10px")
    .merge(shardSel).text(d => `shard-${d.shard_id}`);
  shardSel.exit().remove();

  simulation.nodes(nodes);
  simulation.force("link").links(links);
  simulation.alpha(0.2).restart();

  // ── Sidebar: node cards ──
  const cardContainer = document.getElementById("node-cards");
  cardContainer.innerHTML = "";
  nodes.forEach(n => {
    const st = statusClass(n.status);
    const m  = n.metrics || {};
    const div = document.createElement("div");
    div.className = `node-card ${st}`;
    div.innerHTML = `
      <div class="node-title">${n.short || n.id.slice(0,8)}
        <span class="badge ${st}">${st.toUpperCase()}</span>
      </div>
      <div class="node-meta">shard-${n.shard_id} &nbsp;|&nbsp; port ${n.port}</div>
      <div class="node-meta">AXL mesh: ${n.up_peers}/${n.total_peers} peers up</div>
      <div class="node-meta">done: ${m.completed||0}  rescued: ${m.tasks_rescued||0}  avg: ${m.avg_completion_s != null ? m.avg_completion_s+'s' : '—'}</div>
    `;
    cardContainer.appendChild(div);
  });

  // ── Sidebar: metrics ──
  const allTasks = data.tasks;
  const total    = new Set(allTasks.map(t => t.task_id)).size;
  const done     = allTasks.filter(t => t.status === "completed").length;
  const alive    = nodes.filter(n => n.status === "alive").length;
  const rescued  = nodes.reduce((s,n) => s + ((n.metrics||{}).tasks_rescued||0), 0);
  document.getElementById("m-total").textContent   = total;
  document.getElementById("m-done").textContent    = done;
  document.getElementById("m-alive").textContent   = alive;
  document.getElementById("m-rescued").textContent = rescued;

  // ── Sidebar: task list ──
  const taskList = document.getElementById("tasks-list");
  taskList.innerHTML = "";
  // Show most recent 30 tasks
  const shown = [...allTasks].sort((a,b) => (b.version||0)-(a.version||0)).slice(0,30);
  shown.forEach(t => {
    const row = document.createElement("div");
    row.className = "task-row";
    row.innerHTML = `
      <div class="task-status-dot ${t.status}"></div>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.task_id.slice(0,18)}</span>
      <span style="color:#8b949e">s${t.shard_id}</span>
    `;
    taskList.appendChild(row);
  });

  // ── Status bar ──
  document.getElementById("status-bar").textContent =
    `Updated ${new Date().toLocaleTimeString()}  |  ${nodes.length} nodes  |  ${links.length} edges`;
}

function ticked() {
  d3.select("#links").selectAll("line")
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);

  d3.select("#nodes").selectAll("circle")
    .attr("cx", d => d.x).attr("cy", d => d.y);

  d3.select("#labels").selectAll("text")
    .attr("x", d => d.x).attr("y", d => d.y);
}

socket.on("connect", () => {
  document.getElementById("status-bar").textContent = "connected — waiting for data...";
});
socket.on("disconnect", () => {
  document.getElementById("status-bar").textContent = "disconnected — reconnecting...";
});
socket.on("graph", data => updateGraph(data));

initSVG();
</script>
</body>
</html>

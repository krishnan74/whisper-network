<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisper Network</title>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg:        #0d1117;
  --surface:   #161b22;
  --surface2:  #21262d;
  --border:    #30363d;
  --text:      #e6edf3;
  --muted:     #8b949e;
  --alive:     #3fb950;
  --alive-bg:  #0d2818;
  --suspect:   #d29922;
  --suspect-bg:#2d1f00;
  --dead:      #f85149;
  --dead-bg:   #300a0a;
  --blue:      #58a6ff;
  --blue-bg:   #0d1f3c;
  --purple:    #bc8cff;
  --mono:      'SF Mono','Fira Code','Cascadia Code',monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Header ── */
#header {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#header .logo {
  font-size: 13px;
  font-weight: bold;
  color: var(--blue);
  letter-spacing: 2px;
  text-transform: uppercase;
  white-space: nowrap;
}
.hstat {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 60px;
}
.hstat .val {
  font-size: 20px;
  font-weight: bold;
  line-height: 1;
}
.hstat .lbl {
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 2px;
}
.hstat .val.green  { color: var(--alive); }
.hstat .val.yellow { color: var(--suspect); }
.hstat .val.blue   { color: var(--blue); }
.hstat .val.purple { color: var(--purple); }
.hstat .val.red    { color: var(--dead); }

.hdivider { width: 1px; height: 36px; background: var(--border); }

#conn-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--dead); margin-left: auto; flex-shrink: 0;
  transition: background 0.4s;
}
#conn-dot.live { background: var(--alive); animation: pulse-dot 2s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.5} }

/* ── Main layout ── */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Left sidebar ── */
#left {
  width: 260px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-title {
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 10px 14px 6px;
  border-bottom: 1px solid var(--border);
}
#node-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.node-card {
  border-radius: 6px;
  padding: 9px 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--border);
  font-size: 11px;
  line-height: 1.7;
  transition: border-color 0.3s, background 0.3s;
}
.node-card.alive   { border-left-color: var(--alive); }
.node-card.suspected { border-left-color: var(--suspect); }
.node-card.dead    { border-left-color: var(--dead); background: #1a0d0d; }
.node-card.offline { border-left-color: var(--border); opacity: 0.5; }

.nc-header { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
.nc-id { font-weight: bold; font-size: 12px; }
.badge {
  font-size: 9px; font-weight: bold; padding: 1px 5px;
  border-radius: 8px; text-transform: uppercase; letter-spacing: 0.5px;
}
.badge.alive     { background: var(--alive-bg);   color: var(--alive); }
.badge.suspected { background: var(--suspect-bg); color: var(--suspect); }
.badge.dead      { background: var(--dead-bg);    color: var(--dead); }
.badge.offline   { background: var(--surface2);   color: var(--muted); }

.nc-row { color: var(--muted); font-size: 10px; }
.nc-row span { color: var(--text); }

/* ── Graph center ── */
#graph-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}
svg { width: 100%; height: 100%; }

.edge { stroke: var(--border); stroke-width: 1.5; transition: stroke 0.3s; }
.edge.axl { stroke: var(--blue); stroke-opacity: 0.35; stroke-width: 2; }

.node-glow {
  fill: none;
  stroke-width: 12;
  opacity: 0;
  pointer-events: none;
}
.node-glow.suspected { stroke: var(--suspect); animation: glow-pulse 1.2s ease-in-out infinite; }
@keyframes glow-pulse { 0%,100%{opacity:0} 50%{opacity:0.25} }

.node-circle {
  stroke-width: 2;
  cursor: pointer;
  transition: r 0.3s, fill 0.4s, stroke 0.4s;
}
.node-circle.alive    { fill: var(--alive-bg);   stroke: var(--alive); }
.node-circle.suspected{ fill: var(--suspect-bg); stroke: var(--suspect); }
.node-circle.dead     { fill: var(--dead-bg);    stroke: var(--dead); }
.node-circle.offline  { fill: var(--surface2);   stroke: var(--border); }

.node-label {
  fill: var(--text); font-size: 11px; font-family: var(--mono);
  pointer-events: none; text-anchor: middle; dominant-baseline: middle;
  font-weight: bold;
}
.node-shard {
  fill: var(--muted); font-size: 9px; font-family: var(--mono);
  pointer-events: none; text-anchor: middle;
}
.node-tasks {
  fill: var(--blue); font-size: 9px; font-family: var(--mono);
  pointer-events: none; text-anchor: middle;
}

.task-dot {
  transition: fill 0.4s;
  opacity: 0.9;
}
.task-dot.completed  { fill: var(--alive); }
.task-dot.in_progress{ fill: var(--suspect); animation: task-pulse 0.8s ease-in-out infinite; }
.task-dot.pending    { fill: var(--muted); }
@keyframes task-pulse { 0%,100%{r:4px} 50%{r:6px} }

#graph-status {
  position: absolute;
  bottom: 10px; left: 12px;
  font-size: 10px; color: var(--muted);
  pointer-events: none;
}

/* ── Right sidebar ── */
#right {
  width: 280px;
  flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#event-feed {
  flex: 1;
  overflow-y: auto;
  padding: 6px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  font-size: 10px;
  line-height: 1.5;
}
.ev-row {
  padding: 3px 6px;
  border-radius: 3px;
  color: var(--muted);
  word-break: break-word;
  animation: ev-in 0.3s ease;
}
@keyframes ev-in { from { opacity:0; transform: translateX(8px); } to { opacity:1; } }
.ev-row.ev-dead     { color: var(--dead);    background: #200808; }
.ev-row.ev-suspect  { color: var(--suspect); background: #1e1500; }
.ev-row.ev-alive    { color: var(--alive);   background: #071a0e; }
.ev-row.ev-task     { color: var(--blue);    background: #071320; }
.ev-row.ev-join     { color: var(--purple);  background: #150d2a; }

#task-panel {
  border-top: 1px solid var(--border);
  padding: 8px;
  max-height: 180px;
  overflow-y: auto;
}
.task-row {
  display: flex; align-items: center; gap: 6px;
  padding: 2px 0; font-size: 10px;
  border-bottom: 1px solid var(--surface2);
}
.tdot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.tdot.completed  { background: var(--alive); }
.tdot.in_progress{ background: var(--suspect); }
.tdot.pending    { background: var(--muted); }
.tid { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--muted); }
.tshard { color: var(--muted); font-size: 9px; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="logo">⬡ Whisper Network</div>
  <div class="hdivider"></div>
  <div class="hstat"><div class="val green" id="h-alive">—</div><div class="lbl">Alive</div></div>
  <div class="hstat"><div class="val yellow" id="h-suspect">—</div><div class="lbl">Suspect</div></div>
  <div class="hstat"><div class="val red" id="h-dead">—</div><div class="lbl">Dead</div></div>
  <div class="hdivider"></div>
  <div class="hstat"><div class="val blue" id="h-total">—</div><div class="lbl">Tasks</div></div>
  <div class="hstat"><div class="val green" id="h-done">—</div><div class="lbl">Done</div></div>
  <div class="hstat"><div class="val yellow" id="h-prog">—</div><div class="lbl">Active</div></div>
  <div class="hdivider"></div>
  <div class="hstat"><div class="val purple" id="h-rescued">—</div><div class="lbl">Rescued</div></div>
  <div class="hstat"><div class="val blue" id="h-mttr">—</div><div class="lbl">MTTR</div></div>
  <div class="hstat"><div class="val green" id="h-avg">—</div><div class="lbl">Avg/task</div></div>
  <div id="conn-dot" title="WebSocket connection"></div>
</div>

<!-- Main -->
<div id="main">

  <!-- Left: node cards -->
  <div id="left">
    <div class="panel-title">Nodes</div>
    <div id="node-list"></div>
  </div>

  <!-- Center: graph -->
  <div id="graph-wrap">
    <svg id="graph"></svg>
    <div id="graph-status">connecting...</div>
  </div>

  <!-- Right: events + tasks -->
  <div id="right">
    <div class="panel-title">Live Events</div>
    <div id="event-feed"></div>
    <div class="panel-title" style="border-top:1px solid var(--border)">Recent Tasks</div>
    <div id="task-panel"></div>
  </div>

</div>

<script>
const socket = io();
let simulation;
const nodeMap = {};  // id → d3 datum (preserves x/y across updates)

// ── D3 init ───────────────────────────────────────────────────────────────────
function initSim() {
  const svg = d3.select('#graph');
  const g   = svg.append('g').attr('id','root');
  svg.call(d3.zoom().scaleExtent([0.25, 4]).on('zoom', e => g.attr('transform', e.transform)));
  g.append('g').attr('id','edges');
  g.append('g').attr('id','glows');
  g.append('g').attr('id','nodes');
  g.append('g').attr('id','labels');

  const W = document.getElementById('graph-wrap').clientWidth;
  const H = document.getElementById('graph-wrap').clientHeight;

  simulation = d3.forceSimulation()
    .force('link',      d3.forceLink().id(d => d.id).distance(170))
    .force('charge',    d3.forceManyBody().strength(-450))
    .force('center',    d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide(48))
    .on('tick', tick);
}

function stClass(s) {
  return ['alive','suspected','dead','offline'].includes(s) ? s : 'offline';
}

// ── Graph update ──────────────────────────────────────────────────────────────
function updateGraph(data) {
  const W = document.getElementById('graph-wrap').clientWidth;
  const H = document.getElementById('graph-wrap').clientHeight;

  // Merge nodes into nodeMap (preserving positions)
  const incomingIds = new Set(data.nodes.map(n => n.id));
  Object.keys(nodeMap).forEach(id => { if (!incomingIds.has(id)) delete nodeMap[id]; });
  data.nodes.forEach(n => {
    if (nodeMap[n.id]) Object.assign(nodeMap[n.id], n);
    else nodeMap[n.id] = { ...n, x: W/2 + (Math.random()-.5)*180, y: H/2 + (Math.random()-.5)*180 };
  });

  const nodes = Object.values(nodeMap);
  const idSet = new Set(nodes.map(n => n.id));
  const links = data.edges
    .filter(([a,b]) => idSet.has(a) && idSet.has(b))
    .map(([a,b]) => ({ source: a, target: b }));

  // Edges
  const edgeSel = d3.select('#edges').selectAll('line').data(links, d => d.source.id+'|'+d.target.id);
  edgeSel.enter().append('line').attr('class','edge axl').merge(edgeSel);
  edgeSel.exit().remove();

  // Glow rings (suspected)
  const glowSel = d3.select('#glows').selectAll('circle').data(nodes, d => d.id);
  glowSel.enter().append('circle').attr('r', 36)
    .merge(glowSel)
    .attr('class', d => `node-glow ${stClass(d.status)}`);
  glowSel.exit().remove();

  // Node circles
  const circleSel = d3.select('#nodes').selectAll('circle').data(nodes, d => d.id);
  circleSel.enter().append('circle').attr('r', 28)
    .call(d3.drag()
      .on('start', (e,d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end',   (e,d) => { if (!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .merge(circleSel)
    .attr('class', d => `node-circle ${stClass(d.status)}`);
  circleSel.exit().remove();

  // Key label (inside circle)
  const lblSel = d3.select('#labels').selectAll('text.node-label').data(nodes, d => d.id);
  lblSel.enter().append('text').attr('class','node-label').attr('dy', '-5px')
    .merge(lblSel).text(d => d.short || d.id.slice(0,8));
  lblSel.exit().remove();

  // Shard label
  const shardSel = d3.select('#labels').selectAll('text.node-shard').data(nodes, d => d.id+'_s');
  shardSel.enter().append('text').attr('class','node-shard').attr('dy', '7px')
    .merge(shardSel).text(d => d.shard_id ? `s-${d.shard_id}` : '');
  shardSel.exit().remove();

  // Active tasks badge
  const taskBadgeSel = d3.select('#labels').selectAll('text.node-tasks').data(nodes, d => d.id+'_t');
  taskBadgeSel.enter().append('text').attr('class','node-tasks').attr('dy', '18px')
    .merge(taskBadgeSel).text(d => d.tasks_held > 0 ? `▸${d.tasks_held}` : '');
  taskBadgeSel.exit().remove();

  simulation.nodes(nodes);
  simulation.force('link').links(links);
  simulation.alpha(0.15).restart();

  document.getElementById('graph-status').textContent =
    `${nodes.length} nodes · ${links.length} edges · ${new Date().toLocaleTimeString()}`;
}

function tick() {
  d3.select('#edges').selectAll('line')
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  d3.select('#glows').selectAll('circle')
    .attr('cx', d => d.x).attr('cy', d => d.y);
  d3.select('#nodes').selectAll('circle')
    .attr('cx', d => d.x).attr('cy', d => d.y);
  d3.select('#labels').selectAll('text')
    .attr('x', d => d.x).attr('y', d => d.y);
}

// ── Sidebar updates ───────────────────────────────────────────────────────────
function updateSidebar(data) {
  const c = data.cluster;

  // Header stats
  const nodes = data.nodes;
  document.getElementById('h-alive').textContent   = nodes.filter(n => n.status==='alive').length;
  document.getElementById('h-suspect').textContent = nodes.filter(n => n.status==='suspected').length;
  document.getElementById('h-dead').textContent    = nodes.filter(n => n.status==='dead').length;
  document.getElementById('h-total').textContent   = c.total;
  document.getElementById('h-done').textContent    = c.completed;
  document.getElementById('h-prog').textContent    = c.in_progress;
  document.getElementById('h-rescued').textContent = c.rescued;
  document.getElementById('h-mttr').textContent    = c.mttr_s != null ? c.mttr_s + 's' : '—';
  document.getElementById('h-avg').textContent     = c.avg_completion_s != null ? c.avg_completion_s + 's' : '—';

  // Node cards
  const list = document.getElementById('node-list');
  list.innerHTML = '';
  nodes.forEach(n => {
    const st = stClass(n.status);
    const m  = n.metrics || {};
    const el = document.createElement('div');
    el.className = `node-card ${st}`;
    el.innerHTML = `
      <div class="nc-header">
        <span class="nc-id">${n.short || n.id.slice(0,8)}</span>
        <span class="badge ${st}">${st}</span>
      </div>
      <div class="nc-row">shard <span>s-${n.shard_id}</span> · port <span>${n.port}</span></div>
      <div class="nc-row">axl <span>${n.up_peers}/${n.total_peers}</span> · holding <span>${n.tasks_held||0}</span></div>
      <div class="nc-row">done <span>${m.completed||0}</span> · rescued <span>${m.tasks_rescued||0}</span> · avg <span>${m.avg_completion_s != null ? m.avg_completion_s+'s' : '—'}</span></div>
    `;
    list.appendChild(el);
  });
}

// ── Event feed ────────────────────────────────────────────────────────────────
const MAX_EVENTS = 60;
function updateEvents(events) {
  const feed = document.getElementById('event-feed');
  const shown = new Set([...feed.querySelectorAll('.ev-row')].map(el => el.dataset.key));
  let added = 0;

  events.slice(0, MAX_EVENTS).forEach(ev => {
    if (shown.has(ev)) return;
    const el = document.createElement('div');
    el.className = 'ev-row';
    el.dataset.key = ev;
    // Classify by content for colour coding
    if (/DEAD|confirmed dead/i.test(ev))          el.classList.add('ev-dead');
    else if (/SUSPECTED|suspect/i.test(ev))       el.classList.add('ev-suspect');
    else if (/alive|recovered|revived|joined/i.test(ev)) el.classList.add('ev-alive');
    else if (/completed|claimed|task/i.test(ev))  el.classList.add('ev-task');
    else if (/join/i.test(ev))                    el.classList.add('ev-join');
    el.textContent = ev;
    feed.insertBefore(el, feed.firstChild);
    added++;
  });

  // Trim overflow
  while (feed.children.length > MAX_EVENTS) feed.removeChild(feed.lastChild);
}

// ── Task list ─────────────────────────────────────────────────────────────────
function updateTaskList(tasks) {
  const panel = document.getElementById('task-panel');
  panel.innerHTML = '';
  const sorted = [...tasks].sort((a,b) => (b.version||0) - (a.version||0)).slice(0, 30);
  sorted.forEach(t => {
    const el = document.createElement('div');
    el.className = 'task-row';
    el.innerHTML = `
      <div class="tdot ${t.status}"></div>
      <div class="tid">${t.task_id}</div>
      <div class="tshard">s${t.shard_id}</div>
    `;
    panel.appendChild(el);
  });
}

// ── Socket events ─────────────────────────────────────────────────────────────
socket.on('connect', () => {
  document.getElementById('conn-dot').className = 'live';
  document.getElementById('graph-status').textContent = 'connected — waiting for data...';
});
socket.on('disconnect', () => {
  document.getElementById('conn-dot').className = '';
  document.getElementById('graph-status').textContent = 'disconnected — reconnecting...';
});
socket.on('update', data => {
  updateGraph(data);
  updateSidebar(data);
  updateEvents(data.events || []);
  updateTaskList(data.tasks || []);
});

initSim();
</script>
</body>
</html>

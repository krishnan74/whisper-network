version: "3.9"

# ── Whisper Network — 6-node local demo ──────────────────────────────────────
#
# All containers share a Docker bridge network.
# node-1 is the Yggdrasil bootstrap (Listen: tls://0.0.0.0:9001).
# Nodes 2-6 peer to node-1 and discover each other via gossip.
#
# Debug APIs are exposed on host ports 8888-8893 for the dashboard.
# Run the dashboard from the host:
#   python -m demo.dashboard
#
# Kill nodes to demo fault tolerance:
#   docker compose kill node-4 node-5 node-6

networks:
  whisper:
    driver: bridge

x-whisper-common: &whisper-common
  build:
    context: .
    dockerfile: Dockerfile
  networks: [whisper]
  restart: "no"
  volumes:
    - ./demo/shards:/shards:ro
    - ./axl:/config:ro

services:
  node-1:
    <<: *whisper-common
    container_name: whisper-node-1
    hostname: node-1
    environment:
      NODE_NUM:   "1"
      SHARD_ID:   "1"
      DEBUG_PORT: "8888"
      LOG_LEVEL:  "INFO"
    ports:
      - "9001:9001"   # Yggdrasil listener (other nodes peer to this)
      - "8888:8888"   # whisper debug API
    volumes:
      - ./demo/shards:/shards:ro
      - ./axl:/config:ro
      - whisper-keys-1:/keys
      - whisper-data-1:/data

  node-2:
    <<: *whisper-common
    container_name: whisper-node-2
    hostname: node-2
    depends_on: [node-1]
    environment:
      NODE_NUM:   "2"
      SHARD_ID:   "2"
      DEBUG_PORT: "8888"
      LOG_LEVEL:  "INFO"
    ports:
      - "8889:8888"
    volumes:
      - ./demo/shards:/shards:ro
      - ./axl:/config:ro
      - whisper-keys-2:/keys
      - whisper-data-2:/data

  node-3:
    <<: *whisper-common
    container_name: whisper-node-3
    hostname: node-3
    depends_on: [node-1]
    environment:
      NODE_NUM:   "3"
      SHARD_ID:   "3"
      DEBUG_PORT: "8888"
      LOG_LEVEL:  "INFO"
    ports:
      - "8890:8888"
    volumes:
      - ./demo/shards:/shards:ro
      - ./axl:/config:ro
      - whisper-keys-3:/keys
      - whisper-data-3:/data

  node-4:
    <<: *whisper-common
    container_name: whisper-node-4
    hostname: node-4
    depends_on: [node-1]
    environment:
      NODE_NUM:   "4"
      SHARD_ID:   "4"
      DEBUG_PORT: "8888"
      LOG_LEVEL:  "INFO"
    ports:
      - "8891:8888"
    volumes:
      - ./demo/shards:/shards:ro
      - ./axl:/config:ro
      - whisper-keys-4:/keys
      - whisper-data-4:/data

  node-5:
    <<: *whisper-common
    container_name: whisper-node-5
    hostname: node-5
    depends_on: [node-1]
    environment:
      NODE_NUM:   "5"
      SHARD_ID:   "5"
      DEBUG_PORT: "8888"
      LOG_LEVEL:  "INFO"
    ports:
      - "8892:8888"
    volumes:
      - ./demo/shards:/shards:ro
      - ./axl:/config:ro
      - whisper-keys-5:/keys
      - whisper-data-5:/data

  node-6:
    <<: *whisper-common
    container_name: whisper-node-6
    hostname: node-6
    depends_on: [node-1]
    environment:
      NODE_NUM:   "6"
      SHARD_ID:   "6"
      DEBUG_PORT: "8888"
      LOG_LEVEL:  "INFO"
    ports:
      - "8893:8888"
    volumes:
      - ./demo/shards:/shards:ro
      - ./axl:/config:ro
      - whisper-keys-6:/keys
      - whisper-data-6:/data

  # ── Optional: Redis for the centralized comparison demo ───────────────────
  redis:
    image: redis:7-alpine
    container_name: whisper-redis
    networks: [whisper]
    ports:
      - "6379:6379"
    profiles: ["comparison"]   # only started with: docker compose --profile comparison up

volumes:
  whisper-keys-1:
  whisper-keys-2:
  whisper-keys-3:
  whisper-keys-4:
  whisper-keys-5:
  whisper-keys-6:
  whisper-data-1:
  whisper-data-2:
  whisper-data-3:
  whisper-data-4:
  whisper-data-5:
  whisper-data-6:
